[project]
name = "assistant-policy"
version = "0.1.0"
description = "Policy engine: action evaluation against autonomy levels and approval rules"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "assistant-shared",
]

[tool.uv.sources]
assistant-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_policy"]
