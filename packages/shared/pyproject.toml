[project]
name = "assistant-shared"
version = "0.1.0"
description = "Shared types, event contracts, and queue helpers"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_shared"]
