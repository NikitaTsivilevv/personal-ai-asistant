[project]
name = "assistant-database"
version = "0.1.0"
description = "SQLAlchemy models, Alembic migrations, session helpers"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "assistant-shared",
]

[tool.uv.sources]
assistant-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_db"]
